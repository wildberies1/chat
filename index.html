<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueMesh PWA</title>
    <meta name="theme-color" content="#007AFF">
    <meta name="description" content="Мессенджер без интернета">
    <link rel="manifest" href="manifest.json">
    <!-- Иконки и шрифты -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #1c1c1e;
            --chat-bg: #000000;
            --msg-in: #262628;
            --msg-out: #007AFF;
            --text: #ffffff;
            --secondary-text: #8e8e93;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Экраны */
        .screen { display: none; height: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        /* Auth Screen */
        #auth-screen { justify-content: center; align-items: center; padding: 20px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #2c2c2e; color: white; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.8; }

        /* Header */
        header { padding: 15px; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .avatar-small { width: 40px; height: 40px; border-radius: 50%; background: #333; object-fit: cover; }
        
        /* Chat List */
        #chat-list { flex: 1; overflow-y: auto; padding: 10px; }
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #2c2c2e; cursor: pointer; }
        .chat-info { margin-left: 15px; flex: 1; }
        .chat-name { font-weight: 600; font-size: 17px; }
        .chat-preview { color: var(--secondary-text); font-size: 14px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* Chat Window */
        #chat-window { flex: 1; display: flex; flex-direction: column; background: var(--chat-bg); }
        #messages-area { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 16px; line-height: 1.4; position: relative; }
        .msg-in { background: var(--msg-in); align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-out { background: var(--msg-out); align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-meta { font-size: 10px; color: rgba(255,255,255,0.6); text-align: right; margin-top: 5px; }
        
        /* Input Area */
        #input-area { padding: 10px; background: #1c1c1e; display: flex; align-items: center; gap: 10px; border-top: 1px solid #333; }
        #message-input { flex: 1; margin: 0; background: #2c2c2e; }
        .action-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background: #2c2c2e; color: var(--primary); font-size: 20px; cursor: pointer; }

        /* Bluetooth Scanner Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #2c2c2e; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; }
        .device-item { padding: 15px; border-bottom: 1px solid #333; cursor: pointer; display: flex; justify-content: space-between; }
        .device-item:hover { background: #3a3a3c; }

        /* Voice Recording UI */
        .recording-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(255,0,0,0.8); padding: 20px; border-radius: 50%; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(1); } }

    </style>
</head>
<body>

    <!-- 1. Экран авторизации -->
    <div id="auth-screen" class="screen active">
        <div style="margin-bottom: 30px;">
            <i class="fab fa-bluetooth-b" style="font-size: 80px; color: var(--primary);"></i>
            <h1>BlueMesh</h1>
            <p style="color: var(--secondary-text);">Связь без границ и интернета</p>
        </div>
        <input type="tel" id="phone-input" placeholder="+7 (999) 000-00-00">
        <button onclick="sendCode()">Получить код</button>
        <div id="code-area" style="display: none; width: 100%;">
            <input type="text" id="code-input" placeholder="Код из СМС" style="text-align: center; letter-spacing: 5px;">
            <button onclick="verifyCode()">Войти</button>
        </div>
    </div>

    <!-- 2. Экран списка чатов -->
    <div id="main-screen" class="screen">
        <header>
            <div style="display: flex; align-items: center;">
                <img src="" id="my-avatar" class="avatar-small" alt="Me">
                <div style="margin-left: 10px;">
                    <div id="my-name" style="font-weight: bold;">User</div>
                    <div id="my-status" style="font-size: 12px; color: #4cd964;">● Online (BT)</div>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <i class="fas fa-search" onclick="scanDevices()" style="font-size: 20px;"></i>
                <i class="fas fa-ellipsis-v" onclick="openSettings()" style="font-size: 20px;"></i>
            </div>
        </header>

        <div id="chat-list">
            <!-- Сюда добавляются чаты -->
            <div class="chat-item" onclick="openChat('system')">
                <div class="avatar-small" style="background: #333; display: flex; align-items: center; justify-content: center;"><i class="fas fa-broadcast-tower"></i></div>
                <div class="chat-info">
                    <div class="chat-name">Система</div>
                    <div class="chat-preview">Добро пожаловать в BlueMesh!</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. Экран переписки -->
    <div id="chat-screen" class="screen">
        <header>
            <i class="fas fa-arrow-left" onclick="closeChat()" style="font-size: 20px;"></i>
            <div style="display: flex; align-items: center; margin-left: 10px;">
                <img src="" id="chat-avatar" class="avatar-small">
                <div style="margin-left: 10px;">
                    <div id="chat-title" style="font-weight: bold;">Name</div>
                    <div id="chat-status" style="font-size: 12px; color: var(--secondary-text);">Bluetooth</div>
                </div>
            </div>
            <i class="fas fa-phone" style="font-size: 20px; color: var(--primary);"></i>
        </header>

        <div id="chat-window" style="flex: 1; position: relative;">
            <div id="messages-area"></div>
            <div class="recording-indicator" id="rec-indicator">
                <i class="fas fa-microphone" style="color: white; font-size: 30px;"></i>
            </div>
        </div>

        <div id="input-area">
            <div class="action-btn" onclick="attachPhoto()"><i class="fas fa-camera"></i></div>
            <input type="text" id="message-input" placeholder="Сообщение..." onkeypress="handleInput(event)">
            <div class="action-btn" id="mic-btn" onmousedown="startRecord()" onmouseup="stopRecord()" ontouchstart="startRecord()" ontouchend="stopRecord()"><i class="fas fa-microphone"></i></div>
            <div class="action-btn" onclick="sendMessage()" style="background: var(--primary); color: white;"><i class="fas fa-paper-plane"></i></div>
        </div>
    </div>

    <!-- Модальное окно сканирования -->
    <div id="scan-modal" class="modal">
        <div class="modal-content">
            <h3>Поиск устройств...</h3>
            <p style="color: var(--secondary-text); font-size: 14px;">Убедитесь, что у собеседника включен экран</p>
            <div id="device-list"></div>
            <button onclick="closeModal()" style="background: #333; margin-top: 20px;">Отмена</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
